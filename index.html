<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اکولایزر باسکیت</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .vertical-slider {
        writing-mode: vertical-lr;
        direction: ltr;
        vertical-align: middle;
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body
    class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-2 sm:p-6"
  >
    <div
      class="bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl border border-slate-800 overflow-hidden"
    >
      <!-- هدر با لوگوی باسکیت -->
      <div class="flex items-center justify-center bg-slate-950 border-b border-slate-800 py-4 px-6">
        <img src="LOGO.webp" alt="Buskit Logo" class="h-14 sm:h-16 object-contain" />
      </div>
      <!-- محتوای اصلی -->
      <div class="p-4 sm:p-8">
      <h1
        class="text-xl sm:text-2xl font-bold text-center mb-1 text-emerald-400 font-mono"
      >
        رک اکولایزر خالص (Pure EQ - ویژه موبایل)
      </h1>
      <p
        class="text-center text-[10px] sm:text-xs text-amber-500 mb-6 font-medium"
      >
        🚀 چیدمان فرکانس‌ها از چپ به راست (بم به زیر) تنظیم شد.
      </p>

      <div class="mb-6 bg-slate-950 p-4 rounded-xl border border-slate-800/80">
        <div
          class="text-[11px] sm:text-xs text-amber-400 font-bold mb-3 border-b border-slate-800 pb-2"
        >
          🎛️ تنظیمات پیش‌فرض (Presets):
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 text-xs">
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="setar"
              checked
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>سه تار</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="tar"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>تار</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="tombak"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>تمبک</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="daf"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>سنتور</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="baglama"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>باقلاما</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="guitar"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>گیتار</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="bass"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>گیتار بیس</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="kamancheh"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>کمانچه</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="ney"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>نی</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="violin"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>ویولون</span>
          </label>
          <label
            class="flex items-center gap-2 bg-slate-900 p-2.5 rounded-lg border border-slate-800 cursor-pointer hover:border-emerald-500/40 transition-all"
          >
            <input
              type="radio"
              name="instrumentPreset"
              value="asheghi"
              class="w-4 h-4 text-emerald-500 accent-emerald-500"
            />
            <span>ساز عاشقی</span>
          </label>
        </div>
      </div>

      <div
        class="mb-6 bg-slate-800/40 p-3 sm:p-4 rounded-xl border border-slate-800 flex flex-col sm:flex-row gap-3 items-center justify-center"
      >
        <button
          id="micBtn"
          class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold py-3 px-8 rounded-xl transition-all text-xs sm:text-sm shadow-md cursor-pointer text-center"
        >
          شروع پردازش زنده میکروفون
        </button>
        <button
          id="resetBtn"
          class="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-amber-400 border border-slate-700 font-medium py-3 px-6 rounded-xl transition-all text-xs sm:text-sm shadow-md cursor-pointer"
        >
          ریست فرکانس‌ها (0dB)
        </button>
      </div>

      <audio id="forceOutput" autoplay muted playsinline class="hidden"></audio>

      <div
        class="bg-slate-950 p-4 sm:p-6 rounded-xl border border-slate-800/80"
      >
        <div
          class="text-[11px] sm:text-xs text-slate-400 font-bold mb-4 border-b border-slate-800 pb-2 text-right"
        >
          کنسول موازنه فرکانسی (Equalizer):
        </div>
        <div
          class="flex justify-between items-stretch h-56 sm:h-60 gap-1"
          dir="ltr"
        >
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">75Hz</span>
            <input
              type="range"
              id="band-75"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-75"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">150Hz</span>
            <input
              type="range"
              id="band-150"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-150"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">300Hz</span>
            <input
              type="range"
              id="band-300"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-300"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">600Hz</span>
            <input
              type="range"
              id="band-600"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-600"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">1.2k</span>
            <input
              type="range"
              id="band-1200"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-1200"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">2.4k</span>
            <input
              type="range"
              id="band-2400"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-2400"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">4.8k</span>
            <input
              type="range"
              id="band-4800"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-4800"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
          <div class="flex flex-col items-center justify-between flex-1">
            <span class="text-[10px] font-bold text-emerald-400">8kHz</span>
            <input
              type="range"
              id="band-8000"
              min="-15"
              max="15"
              value="0"
              step="1"
              class="vertical-slider h-32 sm:h-36 w-3.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-400"
            />
            <span
              id="val-8000"
              class="text-[9px] font-mono text-slate-400 bg-slate-900 px-1 rounded"
              >0dB</span
            >
          </div>
        </div>
      </div>
      </div><!-- /محتوای اصلی -->
    </div>

    <script>
      const micBtn = document.getElementById("micBtn");
      const resetBtn = document.getElementById("resetBtn");
      const forceOutput = document.getElementById("forceOutput");
      const frequencies = [75, 150, 300, 600, 1200, 2400, 4800, 8000];

      let audioCtx = null,
        streamSource = null,
        localStream = null;
      let filters = {},
        isProcessing = false;

      const instrumentPresets = {
        setar: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        tar: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        tombak: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        daf: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        baglama: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        guitar: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        bass: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        kamancheh: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        violin: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        asheghi: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
        ney: {
          75: 0,
          150: 0,
          300: 0,
          600: 0,
          1200: 0,
          2400: 0,
          4800: 0,
          8000: 0,
        },
      };

      async function startMicEngine() {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)({
            latencyHint: "interactive",
            sampleRate: 44100,
          });

          localStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: { ideal: false },
              noiseSuppression: { ideal: false },
              autoGainControl: { ideal: false },
              channelCount: { ideal: 1 },
            },
          });

          forceOutput.srcObject = localStream;
          streamSource = audioCtx.createMediaStreamSource(localStream);

          let lastNode = streamSource;
          frequencies.forEach((freq, index) => {
            const filter = audioCtx.createBiquadFilter();
            if (index === 0) filter.type = "lowshelf";
            else if (index === frequencies.length - 1)
              filter.type = "highshelf";
            else {
              filter.type = "peaking";
              filter.Q.value = 1.0;
            }

            filter.frequency.value = freq;
            filter.gain.value = parseFloat(
              document.getElementById(`band-${freq}`).value,
            );

            lastNode.connect(filter);
            lastNode = filter;
            filters[freq] = filter;
          });

          lastNode.connect(audioCtx.destination);

          isProcessing = true;
          micBtn.textContent = "قطع ماژول زنده استودیو";
          micBtn.className =
            "w-full sm:w-auto bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded-xl transition-all text-xs sm:text-sm shadow-md cursor-pointer text-center";
        } catch (err) {
          alert(
            "خطا؛ دسترسی به میکروفون صادر نشد یا اتصال بر بستر HTTPS نیست.",
          );
          console.error(err);
        }
      }

      function applyPreset(presetName) {
        const preset = instrumentPresets[presetName];
        if (!preset) return;

        frequencies.forEach((freq) => {
          const targetDb = preset[freq];
          const slider = document.getElementById(`band-${freq}`);
          const valLabel = document.getElementById(`val-${freq}`);

          if (slider) slider.value = targetDb;
          if (valLabel)
            valLabel.textContent = `${targetDb > 0 ? "+" : ""}${targetDb}dB`;

          if (isProcessing && filters[freq]) {
            filters[freq].gain.setValueAtTime(targetDb, audioCtx.currentTime);
          }
        });
      }

      function stopMicEngine() {
        if (localStream) localStream.getTracks().forEach((t) => t.stop());
        forceOutput.srcObject = null;
        if (audioCtx) audioCtx.close().then(() => (audioCtx = null));
        filters = {};
        isProcessing = false;
        micBtn.textContent = "شروع پردازش زنده میکروفون";
        micBtn.className =
          "w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold py-3 px-8 rounded-xl transition-all text-xs sm:text-sm shadow-md cursor-pointer text-center";
      }

      frequencies.forEach((freq) => {
        document
          .getElementById(`band-${freq}`)
          .addEventListener("input", () => {
            const val = document.getElementById(`band-${freq}`).value;
            document.getElementById(`val-${freq}`).textContent =
              `${val > 0 ? "+" : ""}${val}dB`;
            if (isProcessing && filters[freq]) {
              filters[freq].gain.setValueAtTime(
                parseFloat(val),
                audioCtx.currentTime,
              );
            }
          });
      });

      document
        .querySelectorAll('input[name="instrumentPreset"]')
        .forEach((radio) => {
          radio.addEventListener("change", (e) => {
            applyPreset(e.target.value);
          });
        });

      resetBtn.addEventListener("click", function () {
        frequencies.forEach((freq) => {
          document.getElementById(`band-${freq}`).value = 0;
          document.getElementById(`val-${freq}`).textContent = "0dB";
          if (isProcessing && filters[freq])
            filters[freq].gain.setValueAtTime(0, audioCtx.currentTime);
        });
      });

      micBtn.addEventListener("click", function () {
        if (!isProcessing) startMicEngine();
        else stopMicEngine();
      });
    </script>
  </body>
</html>
